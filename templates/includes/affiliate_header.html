{% load static %}
    <!-- Header -->
    <header class="sticky top-0 z-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm
                   border-b border-slate-200 dark:border-slate-700
                   flex items-center gap-3 px-4 sm:px-6 h-14">
      <button type="button" data-sidebar-toggle
              class="lg:hidden p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 focus-ring transition-colors"
              aria-label="فتح القائمة الجانبية" aria-expanded="false" aria-controls="sidebar">
        <i data-lucide="menu" class="h-5 w-5" aria-hidden="true"></i>
      </button>
      <div class="flex-1 max-w-xs lg:max-w-md">
        <div class="relative">
          <span class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none text-slate-400">
            <i data-lucide="search" class="h-4 w-4" aria-hidden="true"></i>
          </span>
          <input type="search" placeholder="ابحث عن منتج للبيع..." aria-label="بحث"
                 class="w-full ps-9 pe-4 py-2 text-sm bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-primary/50 transition-colors">
        </div>
      </div>
      <span class="hidden sm:inline-flex items-center gap-1 text-xs font-semibold
                   bg-emerald-50 dark:bg-emerald-950/40 text-emerald-700 dark:text-emerald-400
                   px-2.5 py-1 rounded-full whitespace-nowrap">
        متاح للسحب: <span class="text-emerald-800 dark:text-emerald-300">1,420 ر.س</span>
      </span>
      <button type="button" data-theme-toggle
              class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 focus-ring transition-colors"
              aria-label="تبديل الوضع الليلي / النهاري">
        <i data-lucide="sun" class="h-4 w-4 dark:hidden" aria-hidden="true"></i>
        <i data-lucide="moon" class="h-4 w-4 hidden dark:block" aria-hidden="true"></i>
      </button>
      <div class="relative" data-actions-dropdown="affiliate-notifications">
        <button type="button"
                class="relative p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 focus-ring transition-colors"
                aria-label="الإشعارات"
                aria-expanded="false"
                aria-haspopup="true">
          <i data-lucide="bell" class="h-4 w-4" aria-hidden="true"></i>
          <span class="absolute top-1.5 end-1.5 h-2 w-2 rounded-full bg-rose-500" aria-hidden="true"></span>
        </button>
        <div class="dropdown-panel absolute end-0 top-full mt-1 w-80 bg-white dark:bg-slate-800
                    border border-slate-200 dark:border-slate-700 rounded-xl shadow-lg
                    py-2 hidden z-50"
             role="menu" aria-label="الإشعارات">
          <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700">
            <p class="text-sm font-semibold">الإشعارات</p>
          </div>
          <a href="#" class="flex items-start gap-3 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" role="menuitem">
            <span class="mt-0.5 h-2 w-2 rounded-full bg-brand-primary shrink-0"></span>
            <div><p class="text-sm text-slate-700 dark:text-slate-300">تم اعتماد عمولة بقيمة <strong class="text-emerald-600">85 ر.س</strong></p><p class="text-xs text-slate-400 mt-0.5">منذ ساعتين</p></div>
          </a>
          <a href="#" class="flex items-start gap-3 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" role="menuitem">
            <span class="mt-0.5 h-2 w-2 rounded-full bg-brand-primary shrink-0"></span>
            <div><p class="text-sm text-slate-700 dark:text-slate-300">طلب جديد <strong>AO-2026-0013</strong> بانتظار التأكيد</p><p class="text-xs text-slate-400 mt-0.5">منذ 5 ساعات</p></div>
          </a>
          <a href="#" class="flex items-start gap-3 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" role="menuitem">
            <span class="mt-0.5 h-2 w-2 rounded-full bg-slate-300 shrink-0"></span>
            <div><p class="text-sm text-slate-700 dark:text-slate-300">منتج جديد متاح للتسويق: <strong>سماعات بلوتوث لاسلكية</strong></p><p class="text-xs text-slate-400 mt-0.5">أمس</p></div>
          </a>
        </div>
      </div>
      <a href="affiliate-profile.html" class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 focus-ring transition-colors" aria-label="الملف الشخصي">
        <img src="{% static 'img/placeholders/affiliate-avatar.svg' %}" alt="صورة أحمد الشمري" class="h-7 w-7 rounded-full ring-2 ring-brand-primary/30">
        <span class="hidden sm:block text-sm font-medium">أحمد</span>
      </a>
    </header>
