{% load static %}
    <!-- Header -->
    <header class="sticky top-0 z-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm
                   border-b border-slate-200 dark:border-slate-700
                   flex items-center gap-3 px-4 sm:px-6 h-14">
      <button type="button" data-sidebar-toggle
              class="lg:hidden p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 focus-ring transition-colors"
              aria-label="فتح القائمة الجانبية" aria-expanded="false" aria-controls="sidebar">
        <i data-lucide="menu" class="h-5 w-5" aria-hidden="true"></i>
      </button>
      <div class="flex-1 max-w-md">
        <div class="relative">
          <span class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none text-slate-400">
            <i data-lucide="search" class="h-4 w-4" aria-hidden="true"></i>
          </span>
          <input type="search" placeholder="بحث..." aria-label="بحث في لوحة التحكم"
                 class="w-full ps-9 pe-4 py-2 text-sm bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-primary/50 transition-colors">
        </div>
      </div>
      <div class="flex-1"></div>
      <div class="flex items-center gap-1 sm:gap-2">
        <button type="button" data-theme-toggle
                class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 focus-ring transition-colors"
                aria-label="تبديل الوضع الليلي / النهاري">
          <i data-lucide="sun" class="h-4 w-4 dark:hidden" aria-hidden="true"></i>
          <i data-lucide="moon" class="h-4 w-4 hidden dark:block" aria-hidden="true"></i>
        </button>
        <a href="notifications.html" class="relative p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 focus-ring transition-colors" aria-label="الإشعارات — 3 إشعارات غير مقروءة">
          <i data-lucide="bell" class="h-4 w-4" aria-hidden="true"></i>
          <span class="absolute top-1.5 end-1.5 h-2 w-2 rounded-full bg-rose-500" aria-hidden="true"></span>
        </a>
        <div class="relative" data-actions-dropdown="profile-menu">
          <button type="button" class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 focus-ring transition-colors" aria-label="قائمة الملف الشخصي" aria-expanded="false" aria-haspopup="true">
            <img src="assets/img/placeholders/avatar.svg" alt="صورة ملف التاجر الشخصي" class="h-7 w-7 rounded-full ring-2 ring-brand-primary/30">
            <span class="hidden sm:block text-sm font-medium">متجر الأناقة</span>
            <i data-lucide="chevron-down" class="hidden sm:block h-3 w-3 text-slate-400" aria-hidden="true"></i>
          </button>
          <div class="dropdown-panel absolute end-0 top-full mt-1 w-52 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-lg py-1 hidden z-50" role="menu">
            <a href="profile.html" class="flex items-center gap-2.5 px-4 py-2.5 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" role="menuitem"><i data-lucide="user-circle" class="h-4 w-4 text-slate-400" aria-hidden="true"></i>الملف الشخصي</a>
            <a href="settings.html" class="flex items-center gap-2.5 px-4 py-2.5 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" role="menuitem"><i data-lucide="settings" class="h-4 w-4 text-slate-400" aria-hidden="true"></i>الإعدادات</a>
            <hr class="my-1 border-slate-200 dark:border-slate-700">
            <a href="logout" class="flex items-center gap-2.5 px-4 py-2.5 text-sm text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-950/30 transition-colors" role="menuitem"><i data-lucide="log-out" class="h-4 w-4" aria-hidden="true"></i>تسجيل الخروج</a>
          </div>
        </div>
      </div>
    </header>
