<!-- SIDEBAR PARTIAL — paste directly into dashboard page body, before the main wrapper -->
<!-- Set aria-current="page" on the <a> matching the current page -->
<aside id="sidebar"

      <defs>
        <linearGradient id="sidebar-logo-g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="50%" stop-color="#8b5cf6"/>
          <stop offset="100%" stop-color="#3b82f6"/>
