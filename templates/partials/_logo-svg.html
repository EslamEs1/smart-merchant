<!-- Inline logo glyph — copy this block directly into HTML. Size with Tailwind (e.g. class="h-8 w-8"). -->
<!-- Used by: _sidebar.html, _footer.html, login.html, register.html, index.html nav -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" aria-hidden="true" class="h-8 w-8 shrink-0">
  <defs>
    <linearGradient id="logo-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Two interlocking rotated squares forming abstract merchant mark -->
  <rect x="4" y="12" width="14" height="14" rx="3" fill="url(#logo-g)" transform="rotate(45 11 19)"/>
  <rect x="18" y="8" width="10" height="10" rx="2" fill="url(#logo-g)" opacity="0.72" transform="rotate(45 23 13)"/>
  <rect x="14" y="22" width="8" height="8" rx="2" fill="url(#logo-g)" opacity="0.50" transform="rotate(45 18 26)"/>
</svg>
