<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" role="img" aria-label="Smart Merchant OS">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Glyph: abstract geometric merchant mark — two interlocking rhombus shapes -->
  <g transform="translate(4, 4)">
    <rect x="0" y="10" width="14" height="14" rx="3" fill="url(#g1)" transform="rotate(45 7 17)"/>
    <rect x="12" y="6" width="10" height="10" rx="2" fill="url(#g1)" opacity="0.75" transform="rotate(45 17 11)"/>
    <rect x="8" y="18" width="8" height="8" rx="2" fill="url(#g1)" opacity="0.55" transform="rotate(45 12 22)"/>
  </g>
  <!-- English wordmark -->
  <text x="52" y="20" font-family="Cairo, Tajawal, system-ui, sans-serif" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.5">Smart Merchant OS</text>
  <!-- Arabic wordmark -->
  <text x="52" y="36" font-family="Cairo, Tajawal, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" direction="rtl">سمارت مرتشانت</text>
</svg>
