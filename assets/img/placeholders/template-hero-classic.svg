  </defs>
  <rect width="200" height="140" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Hero header -->
  <rect width="200" height="55" rx="8" fill="url(#thc)"/>
  <rect y="47" width="200" height="8" fill="url(#thc)"/>
  <rect x="40" y="14" width="120" height="8" rx="4" fill="white" opacity="0.9"/>
  <rect x="60" y="28" width="80" height="6" rx="3" fill="white" opacity="0.6"/>
  <!-- CTA button -->
