  <rect x="16" y="68" width="80" height="6" rx="3" fill="#0f172a"/>
  <rect x="16" y="80" width="120" height="5" rx="2.5" fill="#94a3b8"/>
  <rect x="16" y="90" width="100" height="5" rx="2.5" fill="#94a3b8"/>
  <!-- Price -->
  <rect x="16" y="104" width="50" height="10" rx="4" fill="#6366f1" opacity="0.15"/>
  <rect x="20" y="107" width="42" height="4" rx="2" fill="#6366f1"/>
  <!-- CTA -->
  <rect x="140" y="104" width="44" height="14" rx="7" fill="url(#thc)"/>
  <rect x="148" y="108" width="28" height="6" rx="3" fill="white"/>
