  <rect x="75" y="60" width="50" height="12" rx="4" fill="#0f172a"/>
  <rect x="83" y="64" width="34" height="4" rx="2" fill="white"/>
  <!-- CTA -->
  <rect x="60" y="80" width="80" height="18" rx="9" fill="url(#tm)"/>
  <rect x="74" y="85" width="52" height="8" rx="4" fill="white"/>
  <!-- FAQ dots -->
  <rect x="16" y="108" width="168" height="1" fill="#e2e8f0"/>
  <rect x="16" y="116" width="120" height="5" rx="2.5" fill="#94a3b8"/>
