<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none" role="img" aria-label="قالب Minimal">
  <defs>
    <linearGradient id="tm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
